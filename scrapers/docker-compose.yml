services:
  ollama:
    image: ollama/ollama:latest
    container_name: doctorpricer_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
      - ./scripts:/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  scraper:
    build: .
    container_name: doctorpricer_scraper
    volumes:
      - ./scripts:/app
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - GEMINI_API_KEY

volumes:
  ollama_models:
